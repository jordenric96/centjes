<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financieel Dashboard - Interactive Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <div class="hoofd-container">
        <header>
            <div class="header-titel">
                <h1>Gezamenlijk Dashboard</h1>
                <div id="status" class="status-badge">Live Status</div>
            </div>
            
            <div class="filter-sectie">
                <label for="jaarSelect">Selecteer jaar: </label>
                <select id="jaarSelect"></select>
            </div>
        </header>

        <section class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 25px;">
            <div class="card totaal-card">
                <h3>Inkomsten</h3>
                <p id="jaarInkomsten" class="bedrag positief">€ 0.00</p>
            </div>
            <div class="card totaal-card">
                <h3>Uitgaven</h3>
                <p id="jaarUitgaven" class="bedrag negatief">€ 0.00</p>
            </div>
            <div class="card totaal-card">
                <h3>Netto Balans</h3>
                <p id="jaarBalans" class="bedrag neutraal">€ 0.00</p>
            </div>
            <div class="card totaal-card" style="background-color: #fafafa;">
                <h3>Vaste Kosten</h3>
                <p id="vastTotaal" class="bedrag negatief" style="font-size: 1.5rem;">€ 0.00</p>
            </div>
        </section>

        <div class="content-grid" style="margin-bottom: 30px;">
            <section class="card">
                <h3>Inkomsten vs Uitgaven</h3>
                <div style="position: relative; height: 300px;">
                    <canvas id="maandGrafiek"></canvas>
                </div>
            </section>
            <section class="card">
                <h3>Verdeling Hoofdgroepen</h3>
                <div style="position: relative; height: 300px;">
                    <canvas id="categorieGrafiek"></canvas>
                </div>
            </section>
        </div>

        <div class="content-grid">
            <section class="card">
                <h3>Trend per Maand</h3>
                <div class="tabel-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Maand</th>
                                <th>In</th>
                                <th>Uit</th>
                                <th>Balans</th>
                            </tr>
                        </thead>
                        <tbody id="maandBody"></tbody>
                    </table>
                </div>
            </section>

            <section class="card">
                <h3>Uitgaven Analyse (Klik voor details)</h3>
                <div class="tabel-wrapper">
                    <table id="drillDownTable">
                        <thead>
                            <tr>
                                <th>Groep / Sub-categorie</th>
                                <th style="text-align: right;">Totaal</th>
                            </tr>
                        </thead>
                        <tbody id="hoofdgroepBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>

        <section class="card" style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">Banktransacties</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="sorteerSelect">
                        <option value="datum">Datum</option>
                        <option value="uitgaven">Hoogste Uitgave</option>
                    </select>
                    <label style="font-size: 0.85rem; cursor: pointer;">
                        <input type="checkbox" id="toonEnkelOverig"> Enkel Overig
                    </label>
                </div>
            </div>
            <div class="tabel-wrapper grote-tabel">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <style>
        .hg-row { cursor: pointer; background-color: #f8fafc; font-weight: 600; }
        .hg-row:hover { background-color: #f1f5f9; }
        .sub-row { display: none; background-color: #ffffff; font-size: 0.85rem; }
        .sub-row td:first-child { padding-left: 40px; color: #64748b; }
        .hg-row i { margin-right: 10px; transition: transform 0.2s; }
        .hg-row.active i { transform: rotate(90deg); }
        .hg-row.active + .sub-row { display: table-row; }
    </style>
</body>
</html>
