<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financieel Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <div class="hoofd-container">
        <header>
            <div class="header-titel">
                <h1>Gezamenlijk Dashboard</h1>
                <div id="status" class="status-badge">Gegevens ophalen...</div>
            </div>
            
            <div class="filter-sectie">
                <label for="jaarSelect">Selecteer jaar: </label>
                <select id="jaarSelect"></select>
            </div>
        </header>

        <section class="dashboard-grid">
            <div class="card totaal-card">
                <h3>Jaaroverzicht: Inkomsten</h3>
                <p id="jaarInkomsten" class="bedrag positief">€ 0.00</p>
            </div>
            <div class="card totaal-card">
                <h3>Jaaroverzicht: Uitgaven</h3>
                <p id="jaarUitgaven" class="bedrag negatief">€ 0.00</p>
            </div>
            <div class="card totaal-card">
                <h3>Netto Balans</h3>
                <p id="jaarBalans" class="bedrag neutraal">€ 0.00</p>
            </div>
        </section>

        <div class="content-grid">
            <section class="card">
                <h3>Overzicht per Maand</h3>
                <div class="tabel-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Maand</th>
                                <th>Inkomsten</th>
                                <th>Uitgaven</th>
                                <th>Balans</th>
                            </tr>
                        </thead>
                        <tbody id="maandBody"></tbody>
                    </table>
                </div>
            </section>

            <section class="card">
                <h3>Uitgaven per Categorie</h3>
                <div class="tabel-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Categorie</th>
                                <th>Totaal</th>
                            </tr>
                        </thead>
                        <tbody id="categorieBody"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <section class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px;">
                <h3 style="margin-bottom: 0;">Transacties in dit jaar</h3>
                
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
                    <label style="font-weight: 600; color: var(--primary); font-size: 0.9rem;">
                        Sorteer op:
                        <select id="sorteerSelect" style="padding: 6px; border-radius: 4px; border: 1px solid #ccc; outline: none; margin-left: 5px;">
                            <option value="datum">Datum (Nieuwste eerst)</option>
                            <option value="uitgaven">Grootste uitgaven eerst</option>
                            <option value="inkomsten">Grootste inkomsten eerst</option>
                        </select>
                    </label>

                    <label style="cursor: pointer; font-weight: 600; color: var(--primary); background: #e1e8ed; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem;">
                        <input type="checkbox" id="toonEnkelOverig" style="margin-right: 5px;"> Toon enkel nog in te delen (Overig)
                    </label>
                </div>
            </div>
            <div class="tabel-wrapper grote-tabel">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

</body>
</html>
